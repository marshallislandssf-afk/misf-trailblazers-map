<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MISF Volunteer Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a1a; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    header {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; background: #fff;
      border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 12px; color: #888; margin-top: 1px; }

    #controls {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 8px 16px; background: #fff;
      border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
    }
    #controls label { font-size: 12px; color: #666; }
    #controls select, #controls input {
      font-size: 12px; padding: 5px 9px;
      border-radius: 7px; border: 1px solid #ccc;
      background: #f9f9f7; color: #1a1a1a; outline: none;
    }
    #vol-count { margin-left: auto; font-size: 12px; font-weight: 500; color: #888; white-space: nowrap; }

    #main { display: flex; flex: 1; overflow: hidden; min-height: 400px; }
    #map  { flex: 1; z-index: 1; min-height: 400px; }

    #panel {
      width: 280px; flex-shrink: 0; background: #fff;
      border-left: 1px solid #e0e0e0;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #panel-header {
      padding: 10px 14px; border-bottom: 1px solid #e0e0e0;
      font-size: 12px; font-weight: 600; color: #555;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    #panel-list { overflow-y: auto; flex: 1; }
    .panel-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
      border-bottom: 0.5px solid #f0f0f0; transition: background 0.1s;
    }
    .panel-item:hover  { background: #f7f7f5; }
    .panel-item.active { background: #EEF4FC; }
    .panel-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .panel-avatar img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .panel-info { overflow: hidden; flex: 1; }
    .panel-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .panel-role { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dept-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15) !important;
      padding: 0 !important; overflow: hidden; min-width: 260px;
    }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-tip-container { display: none; }

    .popup-inner { padding: 14px 16px; background: #ffffff; }
    .popup-head  { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .popup-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
    }
    .popup-title h3   { font-size: 14px; font-weight: 600; }
    .popup-badge {
      display: inline-block; font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 20px; margin-top: 3px;
    }
    .popup-table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .popup-table td { padding: 3px 0; vertical-align: top; }
    .popup-table td:first-child { color: #999; width: 72px; }
    .popup-bio {
      font-size: 11px; color: #666; font-style: italic;
      line-height: 1.5; margin-top: 8px; padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }

    .legend-bar {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 7px 16px; background: #fff;
      border-top: 1px solid #e0e0e0; flex-shrink: 0;
      font-size: 11px; color: #555;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    .marker-pin {
      border-radius: 50%; border: 2.5px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.28);
    }
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large { background-clip: padding-box; border-radius: 50%; }
    .marker-cluster-small  { background-color: rgba(127,119,221,0.35); }
    .marker-cluster-small div  { background-color: rgba(127,119,221,0.85); }
    .marker-cluster-medium { background-color: rgba(55,138,221,0.35); }
    .marker-cluster-medium div { background-color: rgba(55,138,221,0.85); }
    .marker-cluster-large  { background-color: rgba(29,158,117,0.35); }
    .marker-cluster-large div  { background-color: rgba(29,158,117,0.85); }
    .marker-cluster div {
      width: 30px; height: 30px; margin: 5px;
      text-align: center; border-radius: 50%;
      font: bold 12px/30px system-ui; color: #fff;
    }

    @media (max-width: 640px) { #panel { display: none; } }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Marshall Islands Soccer Federation</h1>
      <p>Global Volunteer Network</p>
    </div>
  </header>
  <div id="controls">
    <label>Department:</label>
    <select id="deptFilter"><option value="">All departments</option></select>
    <label>Search:</label>
    <input type="text" id="search" placeholder="Name, city, or role…" style="width:170px"/>
    <span id="vol-count"></span>
  </div>
  <div id="main">
    <div id="map"></div>
    <div id="panel">
      <div id="panel-header">
        <span>Volunteers</span>
        <span id="panel-sub" style="font-weight:400;color:#aaa"></span>
      </div>
      <div id="panel-list"></div>
    </div>
  </div>
  <div class="legend-bar" id="legend"></div>
</div>

const deptColors = {
  "Board":                   {pin:"#7F77DD", light:"#EEEDFE", dark:"#3C3489"},
  "Operations":              {pin:"#378ADD", light:"#E6F1FB", dark:"#0C447C"},
  "Marketing and Commercial":{pin:"#D4537E", light:"#FBEAF0", dark:"#72243E"},
  "Sporting Operations":     {pin:"#1D9E75", light:"#E1F5EE", dark:"#085041"},
  "National Team":           {pin:"#EF9F27", light:"#FAEEDA", dark:"#633806"},
  "Community & Schools":     {pin:"#E24B4A", light:"#FCEBEB", dark:"#791F1F"}
};

function initials(n) { return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }

function makeIcon(v) {
  const col = (deptColors[v.dept]||{pin:"#888"}).pin;
  return L.divIcon({
    className:"",
    html:`<div class="marker-pin" style="background:${col};width:22px;height:22px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.28)"></div>`,
    iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-14]
  });
}

function popupHTML(v) {
  const dc = deptColors[v.dept]||{pin:"#888",light:"#eee",dark:"#333"};
  const hasPhoto = v.photo && v.photo.trim()!=="";
  const avatar = hasPhoto
    ? `<img src="${v.photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0">`
    : `<div class="popup-avatar" style="background:${dc.light};color:${dc.pin};width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600">${initials(v.name)}</div>`;
  const rows = [
    ["Location", `${v.city}, ${v.country}`],
    ["Time zone", v.tz],
    v.email ? ["Email", `<a href="mailto:${v.email}" style="color:#185FA5">${v.email}</a>`] : null,
    v.phone ? ["Phone", v.phone] : null,
    v.teams ? ["Supports", v.teams] : null,
  ].filter(Boolean).map(([k,val])=>`<tr><td style="color:#999;width:72px;padding:3px 0;vertical-align:top">${k}</td><td style="padding:3px 0;vertical-align:top">${val}</td></tr>`).join("");
  const bio = v.bio ? `<div class="popup-bio">"${v.bio}"</div>` : "";
  return `<div style="padding:14px 16px;background:#ffffff;font-family:system-ui,-apple-system,sans-serif">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      ${avatar}
      <div>
        <div style="font-size:14px;font-weight:600;margin-bottom:3px">${v.flag||""} ${v.name}</div>
        <span style="display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:${dc.light};color:${dc.dark}">${v.dept}</span>
      </div>
    </div>
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr><td style="color:#999;width:72px;padding:3px 0;vertical-align:top">Role</td><td style="padding:3px 0;font-weight:600">${v.role}</td></tr>
      ${rows}
    </table>
    ${bio}
  </div>`;
}

const map = L.map("map",{zoomControl:true}).setView([25,10],2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:18
}).addTo(map);

const cluster = L.markerClusterGroup({
  maxClusterRadius:50, spiderfyOnMaxZoom:true,
  showCoverageOnHover:false, zoomToBoundsOnClick:true
});

const markerMap = new Map();

function buildMarkers(data) {
  cluster.clearLayers(); markerMap.clear();
  data.forEach(v => {
    const m = L.marker([v.lat,v.lng],{icon:makeIcon(v)});
    m.bindPopup(popupHTML(v),{maxWidth:290,minWidth:260});
    m.on("click",()=>highlightPanel(v.name));
    markerMap.set(v.name,m);
    cluster.addLayer(m);
  });
}
map.addLayer(cluster);

function buildPanel(data) {
  const list = document.getElementById("panel-list");
  list.innerHTML="";
  document.getElementById("panel-sub").textContent=`${data.length} volunteer${data.length!==1?"s":""}`;
  data.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(v=>{
    const dc = deptColors[v.dept]||{pin:"#888",light:"#eee"};
    const hasPhoto = v.photo && v.photo.trim()!=="";
    const av = hasPhoto
      ? `<div class="panel-avatar"><img src="${v.photo}" alt="${v.name}"></div>`
      : `<div class="panel-avatar" style="background:${dc.light};color:${dc.pin}">${initials(v.name)}</div>`;
    const item = document.createElement("div");
    item.className="panel-item"; item.dataset.name=v.name;
    item.innerHTML=`${av}<div class="panel-info"><div class="panel-name">${v.flag||""} ${v.name}</div><div class="panel-role">${v.role} &middot; ${v.city}</div></div><div class="dept-dot" style="background:${dc.pin}"></div>`;
    item.addEventListener("click",()=>{
      const m=markerMap.get(v.name);
      if(m){ cluster.zoomToShowLayer(m,()=>{ map.setView([v.lat,v.lng],10); m.openPopup(); }); }
      highlightPanel(v.name);
    });
    list.appendChild(item);
  });
}

function highlightPanel(name) {
  document.querySelectorAll(".panel-item").forEach(el=>el.classList.remove("active"));
  const el=document.querySelector(`.panel-item[data-name="${CSS.escape(name)}"]`);
  if(el){ el.classList.add("active"); el.scrollIntoView({block:"nearest",behavior:"smooth"}); }
}

function buildLegend() {
  const leg=document.getElementById("legend");
  Object.entries(deptColors).forEach(([dept,cols])=>{
    const i=document.createElement("div"); i.className="legend-item";
    i.innerHTML=`<div class="legend-dot" style="background:${cols.pin}"></div>${dept}`;
    leg.appendChild(i);
  });
}

function populateDepts() {
  const sel=document.getElementById("deptFilter");
  [...new Set(volunteers.map(v=>v.dept))].sort().forEach(d=>{
    const o=document.createElement("option"); o.value=d; o.textContent=d; sel.appendChild(o);
  });
}

function filter() {
  const dept=document.getElementById("deptFilter").value;
  const q=document.getElementById("search").value.toLowerCase();
  const out=volunteers.filter(v=>
    (!dept||v.dept===dept)&&
    (!q||v.name.toLowerCase().includes(q)||v.city.toLowerCase().includes(q)||v.role.toLowerCase().includes(q))
  );
  buildMarkers(out); buildPanel(out);
  document.getElementById("vol-count").textContent=`${out.length} shown`;
}

document.getElementById("deptFilter").addEventListener("change",filter);
document.getElementById("search").addEventListener("input",filter);

buildLegend(); populateDepts(); buildMarkers(volunteers); buildPanel(volunteers);
document.getElementById("vol-count").textContent=`${volunteers.length} shown`;
</script>
</body>
</html>
